services:
  - type: web
    name: sbcweb-demo
    runtime: node
    plan: free
    rootDir: SBCWeb
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: DEMO_MODE
        value: "1"
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: SERVER_HOST
        value: "0.0.0.0"
